<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="main.css">
    <script src="src/loginStore.js"></script>
</head>
<body>
    <h1>Đăng Nhập</h1>
    <form id="form-login" method="post" action="xulydangnhap.php">
        <label for="email">Email:</label>
        <input type="email" id="email-input">
        <br/>

        <label>Mật khẩu:</label>
        <input type="password" id="password-input"  />
    <br/>
        <button type="submit" id="login-button" class="form-dep" data-testid="login-submit">Đăng Nhập</button>
    
    <div id="login-message"></div>
    </form>
    <script>
        //tim phan tu co id "form-login"
        const loginForm = document.getElementById("form-login");
        //dang ky su kien "submit" cho form
        loginForm.addEventListener("submit", function(event) {
            event.preventDefault(); //ngan chan form goi du lieu di
            //thu thap thong tin tren cac o nhap lieu
            var email = document.getElementById("email-input").value;
            var password = document.getElementById("password-input").value;
            //goi ham xu ly
            var thongbao = login(email, password);
            alert(thongbao);
        });
    </script>
</body>
</html>
